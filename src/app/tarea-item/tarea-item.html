<div class="item" [class.completada]="tarea().completada">

  <input
    type="checkbox"
    [checked]="tarea().completada"
    (change)="alCompletar()"
  />

  <span class="texto">
    {{ tarea().texto }}
  </span>

  <button class="btn-eliminar" (click)="alEliminar()">
    Eliminar
  </button>

</div>
